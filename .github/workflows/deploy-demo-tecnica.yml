# ============================================================
# Deploy Portal de Pagos - Demo Técnica (AlcaldiaTest)
# 
# Se ejecuta automáticamente en cada push a main
# También se puede ejecutar manualmente desde GitHub Actions
#
# AUTENTICACIÓN: Service Principal (ya configurado)
# APP SERVICE: AlcaldiaTest
# URL: https://alcaldiatest-d9d8cafxesa2cybx.brazilsouth-01.azurewebsites.net
# ============================================================

name: 🧪 Deploy Demo Técnica

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: AlcaldiaTest

jobs:
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --omit=dev

      - name: 📁 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app-demo-tecnica
          path: |
            .
            !.git
            !.github
            !envs
            !*.PublishSettings
            !docs/ai
          retention-days: 1

  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app-demo-tecnica

      - name: 🔐 Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D01773C3DA4D41B7B968F26F8C90669A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1BE3F06F33264CBD901C3C38E48096DD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EAE7978F640B45AD9FAD7F0AAEFC2F10 }}

      - name: 🚀 Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: .

      - name: ✅ Deployment complete
        run: |
          echo "=========================================="
          echo "✅ Deploy exitoso!"
          echo "🧪 Ambiente: Demo Técnica"
          echo "🌐 URL: https://alcaldiatest-d9d8cafxesa2cybx.brazilsouth-01.azurewebsites.net"
          echo "=========================================="
