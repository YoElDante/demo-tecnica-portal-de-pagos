# ============================================================
# Deploy Portal de Pagos Municipal a Azure Web App
# 
# Este workflow despliega automáticamente a Azure cuando se
# hace push a la rama main.
#
# CONFIGURACIÓN REQUERIDA:
# 1. Ir a GitHub repo > Settings > Secrets and variables > Actions
# 2. Crear secreto: AZURE_WEBAPP_PUBLISH_PROFILE
# 3. Pegar el contenido COMPLETO del archivo .PublishSettings
#    descargado desde Azure Portal
# ============================================================

name: Deploy to Azure - El Manzano

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

env:
  AZURE_WEBAPP_NAME: portal-de-pagos-elmanzano-cba
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --omit=dev

      - name: 📁 Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !.git
            !.github
            !envs
            !*.PublishSettings
            !docs/ai
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 🚀 Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: ✅ Deployment complete
        run: echo "App deployed to https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"