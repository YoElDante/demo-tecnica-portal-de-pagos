# ============================================================
# Deploy Portal de Pagos Municipal a Azure Web App
# 
# Workflow UNIFICADO para todos los municipios
# Selecciona el municipio al ejecutar manualmente
#
# CONFIGURACIÓN REQUERIDA (GitHub > Settings > Secrets):
#
# Para municipios (Publish Profile):
#   - AZURE_PUBLISH_ELMANZANO  → .PublishSettings de El Manzano
#   - AZURE_PUBLISH_TINOCO     → .PublishSettings de Tinoco
#   - AZURE_PUBLISH_SANJOSE    → .PublishSettings de San José
#
# Para Test/Demo (Service Principal - ya configurado):
#   - AZUREAPPSERVICE_CLIENTID_xxx
#   - AZUREAPPSERVICE_TENANTID_xxx
#   - AZUREAPPSERVICE_SUBSCRIPTIONID_xxx
#
# NOMBRES DE APP SERVICE EN AZURE:
#   - portal-de-pagos-elmanzano-cba
#   - portal-de-pagos-tinoco-cba
#   - portal-de-pagos-sanjose-cba
#   - AlcaldiaTest (demo/pruebas)
# ============================================================

name: 🚀 Deploy Portal de Pagos

on:
  # Ejecutar manualmente desde GitHub Actions
  workflow_dispatch:
    inputs:
      municipio:
        description: '🏛️ Municipio a deployar'
        required: true
        type: choice
        options:
          - test
          - elmanzano
          - tinoco
          - sanjose
        default: test

env:
  NODE_VERSION: '20.x'

jobs:
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --omit=dev

      - name: 📁 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !.git
            !.github
            !envs
            !*.PublishSettings
            !docs/ai
          retention-days: 1

  deploy:
    name: 🚀 Deploy to ${{ github.event.inputs.municipio }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # ============================================================
      # Deploy según municipio seleccionado
      # ============================================================
      
      # --- TEST (AlcaldiaTest) - Usa Service Principal ---
      - name: 🔐 Login to Azure (Test)
        if: ${{ github.event.inputs.municipio == 'test' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D01773C3DA4D41B7B968F26F8C90669A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1BE3F06F33264CBD901C3C38E48096DD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EAE7978F640B45AD9FAD7F0AAEFC2F10 }}

      - name: 🧪 Deploy Test (AlcaldiaTest)
        if: ${{ github.event.inputs.municipio == 'test' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: AlcaldiaTest
          slot-name: Production
          package: .

      # --- MUNICIPIOS - Usan Publish Profile ---
      - name: 🏛️ Deploy El Manzano
        if: ${{ github.event.inputs.municipio == 'elmanzano' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: portal-de-pagos-elmanzano-cba
          publish-profile: ${{ secrets.AZURE_PUBLISH_ELMANZANO }}
          package: .

      - name: 🏛️ Deploy Tinoco
        if: ${{ github.event.inputs.municipio == 'tinoco' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: portal-de-pagos-tinoco-cba
          publish-profile: ${{ secrets.AZURE_PUBLISH_TINOCO }}
          package: .

      - name: 🏛️ Deploy San José de las Salinas
        if: ${{ github.event.inputs.municipio == 'sanjose' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: portal-de-pagos-sanjose-cba
          publish-profile: ${{ secrets.AZURE_PUBLISH_SANJOSE }}
          package: .

      - name: ✅ Deployment complete
        run: |
          echo "=========================================="
          echo "✅ Deploy exitoso!"
          echo "🏛️ Municipio: ${{ github.event.inputs.municipio }}"
          if [ "${{ github.event.inputs.municipio }}" == "test" ]; then
            echo "🌐 URL: https://alcaldiatest.azurewebsites.net"
          else
            echo "🌐 URL: https://portal-de-pagos-${{ github.event.inputs.municipio }}-cba.azurewebsites.net"
          fi
          echo "=========================================="
