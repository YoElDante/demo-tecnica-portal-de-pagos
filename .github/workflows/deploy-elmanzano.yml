# ============================================================
# Deploy Portal de Pagos - Municipalidad de El Manzano
# 
# Se ejecuta automáticamente en cada push a main
# También se puede ejecutar manualmente desde GitHub Actions
#
# AUTENTICACIÓN: Publish Profile
# SECRET REQUERIDO: AZURE_PUBLISH_ELMANZANO
# APP SERVICE: portal-de-pagos-elmanzano-cba
# URL: https://portal-de-pagos-elmanzano-cba.azurewebsites.net
# ============================================================

name: 🏛️ Deploy El Manzano

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: portal-de-pagos-elmanzano-cba

jobs:
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --omit=dev

      - name: 📁 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app-elmanzano
          path: |
            .
            !.git
            !.github
            !envs
            !*.PublishSettings
            !docs/ai
          retention-days: 1

  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app-elmanzano

      - name: 🚀 Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_ELMANZANO }}
          package: .

      - name: ✅ Deployment complete
        run: |
          echo "=========================================="
          echo "✅ Deploy exitoso!"
          echo "🏛️ Municipio: El Manzano"
          echo "🌐 URL: https://portal-de-pagos-elmanzano-cba.azurewebsites.net"
          echo "=========================================="
